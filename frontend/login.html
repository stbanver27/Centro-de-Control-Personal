<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ControlOS — Login</title>
  <link rel="stylesheet" href="/static/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    /* Grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }
    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 1rem;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo h1 {
      font-family: var(--font-head);
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text);
      line-height: 1;
    }
    .login-logo h1 span { color: var(--accent2); }
    .login-logo p {
      color: var(--text3);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 0 60px rgba(124,58,237,0.1), var(--shadow2);
    }

    .login-card h2 {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: var(--text3);
      font-size: 0.82rem;
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }

    .btn-login {
      width: 100%;
      justify-content: center;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-family: var(--font-head);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
      position: relative;
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-hint {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--text3);
      font-family: var(--font-mono);
    }
    .login-hint kbd {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-family: var(--font-mono);
      color: var(--text2);
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red2);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1>Control<span>OS</span></h1>
      <p>// tu segunda mente</p>
    </div>

    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <p>Centro de control personal</p>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" placeholder="admin@controlos.app" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-login" id="btn-login">
        Entrar al sistema
      </button>

      <p class="login-hint">
        <kbd>admin@controlos.app</kbd> / <kbd>admin1234</kbd>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('controlos_token')) {
      window.location.href = '/dashboard';
    }

    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin      = document.getElementById('btn-login');
    const errorMsg      = document.getElementById('error-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    async function doLogin() {
      const email    = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) { showError('Completa todos los campos.'); return; }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Verificando...';
      errorMsg.classList.remove('show');

      try {
        const data = await api.login(email, password);
        setToken(data.access_token);
        window.location.href = '/dashboard';
      } catch (e) {
        showError(e.message || 'Credenciales incorrectas.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar al sistema';
      }
    }

    btnLogin.addEventListener('click', doLogin);
    [emailInput, passwordInput].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
  </script>
</body>
</html>
